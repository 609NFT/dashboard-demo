<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
    <meta name="description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta name="theme-color" content="#0b0d12">
    <link rel="icon" href="data:image/svg+xml,<svg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22><rect%20x=%2212%22%20y=%2212%22%20width=%2276%22%20height=%2276%22%20rx=%2218%22%20fill=%22%236366f1%22/></svg>">
    <!-- Social share preview (Open Graph + Twitter). When you brand this app, update the
         title/description here and swap og:image & twitter:image for your own 1200x630 image. -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dashboard">
    <meta property="og:description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta property="og:image" content="https://vibekit.bot/public/og-vibekit.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dashboard">
    <meta name="twitter:description" content="Admin dashboard with live stats, charts, and a sortable data table.">
    <meta name="twitter:image" content="https://vibekit.bot/public/og-vibekit.png">
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>
<aside class="sidebar" id="sidebar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    </span>
    Dashboard
  </div>
  <div class="nav-label">Menu</div>
  <nav>
    <a class="nav-item active" href="#overview">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Overview
    </a>
    <a class="nav-item" href="#users">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
      Users
    </a>
    <a class="nav-item" href="#revenue">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>
      Revenue
    </a>
    <a class="nav-item" href="#settings">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </nav>
  <div class="user-chip">
    <div class="avatar">YOU</div>
    <div>
      <div class="user-name">Admin</div>
      <div class="user-role">Owner</div>
    </div>
  </div>
</aside>

<main class="content">
  <header class="topbar">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">☰</button>
    <h1>Overview</h1>
    <div class="topbar-actions">
      <button class="icon-btn" title="Notifications" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>
      </button>
    </div>
  </header>

  <section class="stat-grid" id="stat-grid"></section>

  <section class="chart-card">
    <div class="chart-head">
      <div>
        <h2>Revenue and signups</h2>
        <div class="sub">Last 30 days</div>
      </div>
      <div class="legend">
        <span><i class="dot dot-revenue"></i> Revenue</span>
        <span><i class="dot dot-signups"></i> Signups</span>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart" height="220"></canvas>
    </div>
  </section>

  <section class="table-card">
    <div class="table-head">
      <h2>Users</h2>
      <input type="search" id="user-search" placeholder="Filter rows…" />
    </div>
    <div class="table-wrap">
      <table class="users-table">
        <thead>
          <tr>
            <th data-sort="name" tabindex="0" role="columnheader" aria-sort="none">Name</th>
            <th data-sort="email" tabindex="0" role="columnheader" aria-sort="none">Email</th>
            <th data-sort="plan" tabindex="0" role="columnheader" aria-sort="none">Plan</th>
            <th data-sort="status" tabindex="0" role="columnheader" aria-sort="none">Status</th>
            <th data-sort="mrr" tabindex="0" role="columnheader" aria-sort="none">MRR</th>
            <th data-sort="createdAt" tabindex="0" role="columnheader" aria-sort="none">Joined</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
